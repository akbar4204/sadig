{% extends "base.html" %}
{% block content %}
<div class="card p-4">
  <h4 class="mb-1">Tambah Catatan Bimbingan</h4>
  <div class="text-muted mb-3">{{ pengajuan.mahasiswa.nama }} • {{ pengajuan.get_jenis_display }}</div>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Simpan</button>
      <a class="btn btn-outline-secondary" href="{% url 'dosen:bimbingan_detail' pengajuan.pk %}">Kembali</a>
    </div>
  </form>
</div>
{% endblock %}
