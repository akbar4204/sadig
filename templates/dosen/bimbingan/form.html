{% extends "base.html" %}
{% block content %}
<div class="card p-4">
  <h4 class="mb-2">Buat Pengajuan Bimbingan</h4>
  <div class="text-muted mb-3">Mahasiswa mengajukan bimbingan; dosen dapat menjadwalkan dan menulis catatan.</div>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Simpan</button>
      <a class="btn btn-outline-secondary" href="{% url 'dosen:bimbingan_list' %}">Kembali</a>
    </div>
  </form>
</div>
{% endblock %}
