{% extends "base.html" %}
{% block content %}
<div class="card mx-auto" style="max-width: 700px;">
  <div class="card-body">
    <h4 class="mb-3">Ganti Password Awal</h4>
    <p class="text-muted">
      Demi keamanan, Anda wajib mengganti password bawaan sebelum menggunakan aplikasi.
    </p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Simpan Password Baru</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
