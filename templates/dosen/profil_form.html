{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h4 class="mb-3">Profil Saya</h4>
    <p class="text-muted">Silakan perbarui data profil Anda.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
