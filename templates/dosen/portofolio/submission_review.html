{% extends "base.html" %}
{% block content %}
<div class="card p-4">
  <h4 class="mb-1">Review Submission</h4>
  <div class="text-muted mb-3">{{ sub.mahasiswa.nama }} • {{ sub.luaran.judul }}</div>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Simpan</button>
      <a class="btn btn-outline-secondary" href="{% url 'dosen:submission_detail' sub.pk %}">Batal</a>
    </div>
  </form>
</div>
{% endblock %}
