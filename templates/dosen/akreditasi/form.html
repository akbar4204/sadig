{% extends "base.html" %}
{% block content %}
<div class="card p-4">
  <h4 class="mb-2">Tambah Dokumen Tri Dharma</h4>
  <div class="text-muted mb-3">Gunakan metadata yang konsisten agar mudah ditarik untuk akreditasi/audit.</div>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Simpan</button>
      <a class="btn btn-outline-secondary" href="{% url 'dosen:akreditasi_list' %}">Kembali</a>
    </div>
  </form>
</div>
{% endblock %}
