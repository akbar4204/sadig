{% extends "base.html" %}
{% block content %}
<div class="card p-4">
  <h4 class="mb-1">Verifikasi Dokumen</h4>
  <div class="text-muted mb-3">{{ doc.judul }} • {{ doc.dosen.nama }}</div>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Simpan</button>
      <a class="btn btn-outline-secondary" href="{% url 'dosen:akreditasi_detail' doc.pk %}">Batal</a>
    </div>
  </form>
</div>
{% endblock %}
